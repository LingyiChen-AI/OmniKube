# WebSocket upgrade plumbing (exec / log streams under /api/v1/{exec,logs}).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + WebSocket → the api service. Override the upstream for non-compose
    # setups (e.g. k8s) by replacing `api:8080` in your own config/ingress.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location /healthz {
        proxy_pass http://api:8080;
    }

    # SPA: serve the file if it exists, else index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
